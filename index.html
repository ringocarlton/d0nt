<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>d0nt.blinkk</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" />
  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8ec;
      --muted: rgba(232,232,236,0.45);
      --accent: #e8e8ec;
      --ease: cubic-bezier(.25,.1,.25,1);
      --ease-spring: cubic-bezier(.34,1.56,.64,1);
    }

    /* ─── RESET ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "IBM Plex Mono", monospace;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* ─── GRAIN OVERLAY ─── */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9000;
      opacity: 0.4;
    }

    /* ─── HEADER ─── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 500;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,11,0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .logo em { font-style: normal; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pill {
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .pill:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .pill.active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
      color: var(--text);
      font-weight: 600;
    }

    /* ─── FOOTER ─── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 500;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: var(--text); }

    /* ═══════════════════════════════════════
       MODE: GALLERY (carousel)
    ═══════════════════════════════════════ */
    .gallery-mode {
      position: fixed;
      inset: 54px 0 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: grab;
      transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
    }
    .gallery-mode.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
    }
    .gallery-mode.grabbing { cursor: grabbing; }

    .cards-track {
      width: 100%;
      height: 52vh;
      position: relative;
      flex-shrink: 0;
    }
    ul.cards {
      list-style: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    ul.cards li {
      position: absolute;
      top: 0;
      left: 50%;
      width: 32vh;
      height: 52vh;
      will-change: transform, opacity;
      -webkit-user-drag: none;
    }
    ul.cards li img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      pointer-events: none;
      display: block;
      background: var(--surface);
      -webkit-user-drag: none;
    }

    .gallery-meta {
      margin-top: 24px;
      text-align: center;
      pointer-events: none;
      flex-shrink: 0;
    }
    .gallery-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 5px;
    }
    .gallery-index {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════
       MODE: DESKTOP (scatter)
    ═══════════════════════════════════════ */
    .desktop-mode {
      position: fixed;
      inset: 54px 0 40px 0;
      overflow: hidden;
      transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
    }
    .desktop-mode.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-12px);
    }

    .icon {
      position: absolute;
      width: 90px;
      text-align: center;
      cursor: grab;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .icon img {
      width: 90px;
      height: 90px;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      display: block;
      will-change: transform;
      transition: box-shadow 0.2s var(--ease);
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .icon:hover img {
      box-shadow: 0 10px 32px rgba(0,0,0,0.55);
    }
    .icon span {
      font-size: 10px;
      color: var(--muted);
      max-width: 100px;
      word-break: break-word;
      line-height: 1.3;
      letter-spacing: 0.04em;
    }
    @media (max-width: 600px) {
      .icon, .icon img { width: 72px; height: 72px; }
    }

    /* ─── HINT TEXT (desktop mode) ─── */
    .desktop-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.visible { display: flex; }
    .lightbox-inner {
      position: relative;
      max-width: min(90vw, 700px);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: default;
    }
    .lightbox-inner img {
      max-width: 100%;
      max-height: 78vh;
      border-radius: 10px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      display: block;
      pointer-events: none;
    }
    .lightbox-caption {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .lightbox-close {
      position: absolute;
      top: -44px;
      right: -4px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      transition: color 0.15s;
    }
    .lightbox-close:hover { color: var(--text); }

    /* ─── ABOUT OVERLAY ─── */
    .about-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      z-index: 3000;
    }
    .about-overlay.visible { display: flex; }
    .about-card {
      max-width: 420px;
      width: 90%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .about-card h3 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 14px;
    }
    .about-card p {
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
    }
    .about-card p + p { margin-top: 10px; }
    .about-card a { color: var(--text); }
    .about-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* ─── INTRO ─── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 5000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.7s var(--ease);
    }
    #intro-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #intro-overlay .intro-logo {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    #intro-overlay .intro-logo em { font-style: normal; }
    #intro-overlay p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #enter-btn {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 24px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: var(--text);
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    #enter-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.5);
    }

    /* ─── TRANSITIONS for mode switch ─── */
    .mode-transition * { transition: none !important; }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="intro-overlay" role="dialog" aria-modal="true">
    <div class="intro-logo">d<em>0</em>nt.blinkk</div>
    <p>the creative universe of Tate</p>
    <button id="enter-btn">Enter</button>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">d<em>0</em>nt.blinkk</div>
    <div class="header-right">
      <button class="pill active" id="btnGallery">Gallery</button>
      <button class="pill" id="btnDesktop">Desktop</button>
      <button class="pill" id="btnAbout">About</button>
    </div>
  </header>

  <!-- ── GALLERY MODE ── -->
  <div class="gallery-mode" id="galleryMode">
    <div class="cards-track" id="cardsTrack">
      <ul class="cards" id="cardsContainer"></ul>
    </div>
    <div class="gallery-meta">
      <div class="gallery-title" id="galleryTitle">—</div>
      <div class="gallery-index" id="galleryIndex"></div>
    </div>
  </div>

  <!-- ── DESKTOP MODE ── -->
  <div class="desktop-mode hidden" id="desktopMode">
    <div id="desktopCanvas"></div>
    <div class="desktop-hint">drag anything · click to open</div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span>© 2026 <a href="https://instagram.com/d0nt.blinkk" target="_blank" rel="noopener">d0nt.blinkk</a></span>
    <span id="footerInfo"></span>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-inner" id="lightboxInner">
      <button class="lightbox-close" id="lightboxClose">×</button>
      <img id="lightboxImg" src="" alt="" />
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

  <!-- ABOUT -->
  <div class="about-overlay" id="aboutOverlay" aria-hidden="true">
    <div class="about-card">
      <h3>About</h3>
      <p>d0nt.blinkk is the creative universe of Tate — a multifaceted artist exploring ideas through motion, identity and digital form.</p>
      <p>Contact: <a href="mailto:chorumz@gmail.com">chorumz@gmail.com</a></p>
      <div class="about-footer">
        <button class="pill" id="closeAbout">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════
    //  SHARED STATE
    // ═══════════════════════════════════════════
    let images = [];
    let currentMode = 'gallery'; // 'gallery' | 'desktop'

    // ── DOM ──
    const galleryMode   = document.getElementById('galleryMode');
    const desktopMode   = document.getElementById('desktopMode');
    const cardsContainer= document.getElementById('cardsContainer');
    const galleryTitle  = document.getElementById('galleryTitle');
    const galleryIndex  = document.getElementById('galleryIndex');
    const desktopCanvas = document.getElementById('desktopCanvas');
    const lightbox      = document.getElementById('lightbox');
    const lightboxImg   = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxInner = document.getElementById('lightboxInner');
    const footerInfo    = document.getElementById('footerInfo');
    const btnGallery    = document.getElementById('btnGallery');
    const btnDesktop    = document.getElementById('btnDesktop');
    const btnAbout      = document.getElementById('btnAbout');
    const aboutOverlay  = document.getElementById('aboutOverlay');
    const introOverlay  = document.getElementById('intro-overlay');

    // ═══════════════════════════════════════════
    //  LIGHTBOX (shared)
    // ═══════════════════════════════════════════
    function openLightbox(src, name) {
      lightboxImg.src = src;
      lightboxCaption.textContent = name;
      lightbox.classList.add('visible');
      lightbox.setAttribute('aria-hidden', 'false');
    }
    function closeLightbox() {
      lightbox.classList.remove('visible');
      lightbox.setAttribute('aria-hidden', 'true');
    }
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    // ═══════════════════════════════════════════
    //  MODE SWITCHING
    // ═══════════════════════════════════════════
    function switchMode(mode) {
      if (mode === currentMode) return;
      currentMode = mode;

      if (mode === 'gallery') {
        desktopMode.classList.add('hidden');
        galleryMode.classList.remove('hidden');
        btnGallery.classList.add('active');
        btnDesktop.classList.remove('active');
        footerInfo.textContent = '';
        // restart gallery loop
        cancelAnimationFrame(galRaf);
        galAnimate();
      } else {
        galleryMode.classList.add('hidden');
        desktopMode.classList.remove('hidden');
        btnDesktop.classList.add('active');
        btnGallery.classList.remove('active');
        footerInfo.textContent = 'drag · explore';
      }
    }

    btnGallery.addEventListener('click', () => switchMode('gallery'));
    btnDesktop.addEventListener('click', () => switchMode('desktop'));

    // ═══════════════════════════════════════════
    //  ABOUT
    // ═══════════════════════════════════════════
    btnAbout.addEventListener('click', () => {
      aboutOverlay.classList.add('visible');
      aboutOverlay.setAttribute('aria-hidden', 'false');
    });
    document.getElementById('closeAbout').addEventListener('click', closeAbout);
    aboutOverlay.addEventListener('click', e => { if (e.target === aboutOverlay) closeAbout(); });
    function closeAbout() {
      aboutOverlay.classList.remove('visible');
      aboutOverlay.setAttribute('aria-hidden', 'true');
    }

    // ─── ESC ───
    window.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); closeAbout(); }
    });

    // ═══════════════════════════════════════════
    //  INTRO
    // ═══════════════════════════════════════════
    document.getElementById('enter-btn').addEventListener('click', () => {
      introOverlay.classList.add('hidden');
      setTimeout(() => introOverlay.style.display = 'none', 750);
    });

    // ═══════════════════════════════════════════
    //  LOAD DATA
    // ═══════════════════════════════════════════
    fetch('images.json')
      .then(r => r.json())
      .then(data => {
        images = data;
        initGallery();
        initDesktop();
        galAnimate();
      })
      .catch(() => {
        images = ['placeholder.jpg', 'placeholder.jpg', 'placeholder.jpg', 'placeholder.jpg'];
        initGallery();
        initDesktop();
        galAnimate();
      });

    // ═══════════════════════════════════════════
    //  GALLERY MODE
    // ═══════════════════════════════════════════
    const GAL = {
      sensitivity: 1.4,
      friction: 0.94,
      gap: 44,
      scaleSpread: 0.38,
      opacitySpread: 0.52,
    };
    let galItems = [];
    let galScrollPos = 0;
    let galTargetPos = 0;
    let galIsDragging = false;
    let galLastX = 0;
    let galVelocity = 0;
    let galRaf;
    let galCardWidth = 0;
    let galTotalWidth = 0;

    function initGallery() {
      cardsContainer.innerHTML = '';
      galItems = [];
      images.forEach((src, i) => {
        const li = document.createElement('li');
        const img = document.createElement('img');
        img.src = `images/${src}`;
        img.draggable = false;
        img.alt = src.replace(/\.[^/.]+$/, '');
        li.appendChild(img);
        cardsContainer.appendChild(li);
        galItems.push({ el: li, index: i, title: src.replace(/\.[^/.]+$/, '') });
        li.addEventListener('click', () => galHandleClick(i));
      });
      galUpdateDims();
      window.addEventListener('resize', galUpdateDims);
    }

    function galUpdateDims() {
      if (galItems.length > 0) {
        galCardWidth  = galItems[0].el.offsetWidth + GAL.gap;
        galTotalWidth = galCardWidth * galItems.length;
      }
    }

    // Gallery drag
    const galEl = document.getElementById('galleryMode');
    galEl.addEventListener('dragstart', e => e.preventDefault());
    galEl.addEventListener('selectstart', e => e.preventDefault());
    galEl.addEventListener('mousedown', e => { e.preventDefault(); galOnStart(e.clientX); });
    window.addEventListener('mousemove', e => { if (currentMode === 'gallery') galOnMove(e.clientX); });
    window.addEventListener('mouseup',   () => { galIsDragging = false; galEl.classList.remove('grabbing'); });
    galEl.addEventListener('touchstart', e => galOnStart(e.touches[0].clientX), { passive: true });
    window.addEventListener('touchmove',  e => {
      if (currentMode === 'gallery' && galIsDragging) {
        e.preventDefault();
        galOnMove(e.touches[0].clientX);
      }
    }, { passive: false });
    window.addEventListener('touchend', () => { galIsDragging = false; });
    galEl.addEventListener('wheel', e => {
      e.preventDefault();
      galTargetPos -= e.deltaY * 0.5;
    }, { passive: false });

    function galOnStart(x) {
      galIsDragging = true;
      galLastX = x;
      galVelocity = 0;
      galEl.classList.add('grabbing');
    }
    function galOnMove(x) {
      if (!galIsDragging) return;
      const delta = x - galLastX;
      galTargetPos += delta * GAL.sensitivity;
      galVelocity = delta * GAL.sensitivity;
      galLastX = x;
    }

    function galAnimate() {
      if (!galIsDragging) {
        galTargetPos += galVelocity;
        galVelocity *= GAL.friction;
        if (Math.abs(galVelocity) < 0.08) {
          const nearest = Math.round(galTargetPos / galCardWidth);
          galTargetPos += (nearest * galCardWidth - galTargetPos) * 0.08;
        }
      }
      galScrollPos += (galTargetPos - galScrollPos) * 0.1;

      let centerIdx = 0, minDist = Infinity;
      const halfCard = galItems.length > 0 ? galItems[0].el.offsetWidth / 2 : 0;

      galItems.forEach((item, i) => {
        if (galTotalWidth === 0) return;
        let rel = (i * galCardWidth + galScrollPos) % galTotalWidth;
        while (rel >  galTotalWidth / 2) rel -= galTotalWidth;
        while (rel < -galTotalWidth / 2) rel += galTotalWidth;

        const dist   = Math.abs(rel);
        const norm   = Math.max(0, 1 - dist / (window.innerWidth * 0.58));
        const scale  = 1 - (1 - norm) * GAL.scaleSpread;
        const opac   = 1 - (1 - norm) * GAL.opacitySpread;

        item.el.style.transform = `translate3d(calc(${rel}px - ${halfCard}px), 0, 0) scale(${scale})`;
        item.el.style.opacity   = opac;
        item.el.style.zIndex    = Math.round(norm * 100);

        if (dist < minDist) { minDist = dist; centerIdx = i; }
      });

      if (galItems.length > 0) {
        galleryTitle.textContent = galItems[centerIdx].title;
        galleryIndex.textContent = `${galItems[centerIdx].index + 1} of ${galItems.length}`;
      }

      galRaf = requestAnimationFrame(galAnimate);
    }

    function galHandleClick(index) {
      if (Math.abs(galVelocity) > 1.2) return;
      if (galleryTitle.textContent === galItems[index].title) {
        openLightbox(`images/${images[index]}`, galItems[index].title);
      } else {
        const matrix = new DOMMatrix(window.getComputedStyle(galItems[index].el).transform);
        galTargetPos -= matrix.m41 + (galItems[index].el.offsetWidth / 2);
      }
    }

    // ═══════════════════════════════════════════
    //  DESKTOP MODE
    // ═══════════════════════════════════════════
    let topZ = 100;
    let driftRaf;

    function initDesktop() {
      desktopCanvas.innerHTML = '';
      const areaW = window.innerWidth;
      const areaH = window.innerHeight - 54 - 40;

      images.forEach((src, i) => {
        const icon = document.createElement('div');
        icon.className = 'icon';

        const left = 40 + Math.random() * (areaW - 180);
        const top  = 20 + Math.random() * (areaH - 160);
        icon.style.left = `${left}px`;
        icon.style.top  = `${top}px`;

        const name = src.replace(/\.[^/.]+$/, '');
        icon.innerHTML = `<img src="images/${src}" alt="${name}" draggable="false"><span>${name}</span>`;
        desktopCanvas.appendChild(icon);

        const img = icon.querySelector('img');
        let isDragging = false, moved = false;
        let offsetX = 0, offsetY = 0;
        let lastX = 0, lastY = 0, lastT = 0, vx = 0, vy = 0;

        function onDown(e) {
          e.preventDefault();
          if (e.type === 'pointerdown') img.setPointerCapture(e.pointerId);
          isDragging = true; moved = false;
          const cx = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
          const cy = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
          const r = icon.getBoundingClientRect();
          offsetX = cx - r.left; offsetY = cy - r.top;
          lastX = cx; lastY = cy; lastT = performance.now();
          vx = 0; vy = 0;
          topZ++; icon.style.zIndex = topZ;
          icon.style.cursor = 'grabbing';
        }
        function onMove(e) {
          if (!isDragging) return;
          const cx = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
          const cy = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
          if (Math.abs(cx - lastX) > 5 || Math.abs(cy - lastY) > 5) moved = true;
          const now = performance.now();
          const dt = Math.max(16, now - lastT);
          vx = (cx - lastX) / dt;
          vy = (cy - lastY) / dt;
          lastX = cx; lastY = cy; lastT = now;
          icon.style.left = (cx - offsetX) + 'px';
          icon.style.top  = (cy - offsetY) + 'px';
        }
        function onUp(e) {
          if (e.type === 'pointerup') img.releasePointerCapture(e.pointerId);
          icon.style.cursor = 'grab';
          if (!isDragging) return;
          isDragging = false;
          // flick inertia
          if (Math.abs(vx) > 0.05 || Math.abs(vy) > 0.05) {
            const decay = 0.9;
            (function step() {
              vx *= decay; vy *= decay;
              let x = parseFloat(icon.style.left) + vx * 16;
              let y = parseFloat(icon.style.top)  + vy * 16;
              x = Math.max(0, Math.min(window.innerWidth  - icon.offsetWidth,  x));
              y = Math.max(0, Math.min(window.innerHeight - 54 - 40 - icon.offsetHeight, y));
              icon.style.left = x + 'px';
              icon.style.top  = y + 'px';
              if (Math.abs(vx) > 0.04 || Math.abs(vy) > 0.04) requestAnimationFrame(step);
            })();
          }
        }

        icon.addEventListener('pointerdown', onDown);
        icon.addEventListener('pointermove', onMove);
        icon.addEventListener('pointerup', onUp);
        icon.addEventListener('pointercancel', () => { isDragging = false; icon.style.cursor = 'grab'; });
        icon.addEventListener('click', () => {
          if (!moved) openLightbox(`images/${src}`, name);
        });
      });

      startDrift();
    }

    function startDrift() {
      cancelAnimationFrame(driftRaf);
      const icons = desktopCanvas.querySelectorAll('.icon');
      function drift(t) {
        icons.forEach((icon, i) => {
          // Only drift if not being dragged (check cursor)
          if (icon.style.cursor === 'grabbing') return;
          const amp = 5;
          const spd = 0.00025 + (i % 7) * 0.00004;
          const dx = Math.sin(t * spd + i) * amp;
          const dy = Math.cos(t * spd * 1.1 + i) * amp * 0.6;
          icon.style.transform = `translate(${dx}px,${dy}px)`;
        });
        driftRaf = requestAnimationFrame(drift);
      }
      requestAnimationFrame(drift);
    }

    window.addEventListener('resize', () => {
      desktopCanvas.querySelectorAll('.icon').forEach(icon => {
        const x = parseFloat(icon.style.left) || 0;
        const y = parseFloat(icon.style.top)  || 0;
        const maxX = window.innerWidth  - icon.offsetWidth  - 8;
        const maxY = window.innerHeight - 54 - 40 - icon.offsetHeight - 8;
        if (x > maxX) icon.style.left = maxX + 'px';
        if (y > maxY) icon.style.top  = maxY + 'px';
      });
    });
  </script>
</body>
</html>
